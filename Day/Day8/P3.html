<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic javascript</title>
</head>
<body>
    <button onclick="changeText()">Click ME</button>
    <p id="Demo">HELLO.</p>
    <script>
        function changeText() {
            document.getElementById("Demo").textContent= "Namaskara Bangalore"
        }
    </script>
</body>
</html>

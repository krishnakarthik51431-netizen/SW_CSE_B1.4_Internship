<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video tag</title>
</head>
<body>
    <p>Video tags</p>
    <!-- video format: mp4/webM/ogg -->
    <video src="sample-5s-360p.mp4" controls>
        Your browser is not supporting the video tag
    </video>
    <video src="sample-5s-360p.webm">
        <!-- w/o the controls the video appear but can't be able to play.
          Javascript can start plaing the video. -->
        Your browser is not supporting the video tag
    </video>
    <!-- width and height of the video -->
    <video src="sample-5s-360p.webm" width="480" height="320" controls>
        your browser is not supporting the video tag
    </video>
</body>
</html>

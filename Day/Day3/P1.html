<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML tables</title>
</head>
<body>
    <p>Html tables</p>
    <p>th: table heading
       tr: tables rows
       td: table data 
    </p>
    <table border="1">
        <caption>Monthly savings report</caption>
        <tr>
            <th>Month</th>
            <th>Savings</th>
        </tr>
        <tr>
            <td>Jaunary</td>
            <td>50000</td>
        </tr>
        <tr>
            <td>February</td>
            <td>100000</td>
        </tr>
    </table>
    <table border="1">
        <caption>Sales report</caption>
        <thead>
            <tr>
                <th>Month</th>
                <th>Sales</th>
            </tr>
            <tbody>
                <tr>
                    <td>JAN</td>
                    <td>52</td>
                </tr>
                <tr>
                    <td>FEB</td>
                    <td>54</td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td>Total</td>
                    <td>106</td>
                </tr>
            </tfoot>
        </thead>
    </table>
</body>
</html>

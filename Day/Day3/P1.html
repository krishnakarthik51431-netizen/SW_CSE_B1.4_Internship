<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML tables</title>
</head>
<body>
    <p>Html tables</p>
    <p>th: table heading
       tr: tables rows
       td: table data 
    </p>
    <table border="1">
        <tr>
            <th>Month</th>
            <th>Savings</th>
        </tr>
        <tr>
            <td>Jaunary</td>
            <td>50000</td>
        </tr>
        <tr>
            <td>February</td>
            <td>100000</td>
        </tr>
    </table>
</body>
</html>

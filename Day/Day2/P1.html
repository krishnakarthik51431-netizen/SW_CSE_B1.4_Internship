<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image tags</title>
    <style>
        .responsive-image {
            max-width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>
    <!-- src: source and alt: alternate text | it is self closing tag like doesnt need a tag. -->
    <img src="dog image.jpg" alt="could not find the image.">
    <!-- if the image is in a folder then -->
    <img src="images file/dog.jpg" alt="could not find the image.">
    <!-- common attributes and variations -->
     <!-- width and height -->
    <img src="dog image.jpg" alt="could not find the image." width="200px" height="100px">
    <!-- giving a tag to the dog like description of the photo when the cursor is on the pic -->
    <img src="dog image.jpg" alt="could not find the image." title="Image of a doggie">
    <!-- style -->
    <img src="dog image.jpg" alt="could not find the image."
    style="width:200px; height:100px; border-radius:20%;border:4px solid #cd2323;">
    <!-- image formats -->
    <!-- 1.JPG , 2.PNG , SVG , ETC -->
    <!-- responsive image via css -->
    <!-- like getting the photo adapt according to the device size -->
    <img src="dog image.jpg" alt="could not find the image." class="responsive-image">
</body>
</html>

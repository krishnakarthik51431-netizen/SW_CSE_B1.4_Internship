<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grouping selector</title>
    <style>
        h1,h3,p{
            margin: 0;
            padding: 0 ;
            color: bisque;
        }
        h2,h4{
            margin: 5;
            padding: 5;
            color: aqua;
        }
    </style>
</head>
<body>
    <h1>Heading 1</h1>
    <h2>Heading 2</h2>
    <h3>Heading 3</h3>
    <h4>Heading 4</h4>
    <p>paragraph 1</p>
    <p>paragraph 2</p>
</body>
</html>

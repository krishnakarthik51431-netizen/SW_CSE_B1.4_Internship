<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyperlink tag</title>
</head>

<body>
    <!-- Hyperlink tag -->
    <!-- relative to URL -->
    <a href="http://www.google.com">opens google</a>
    <!-- external URL -->
    <a href="P2.html">opens P2 html file</a>
    <p id="section1">
        hello everyone.
    </p>
    <a href="#section1">take me to the section 1</a>
    <a href="mailto:krishnakarthik51431@gmail.com">email to me</a>
    <!-- attributes of a tag -->
     <!-- default.same tag -->
     <a href="http://www.google.com" target="_self">take me to the google.com</a>
     <!-- full document body -->
     <a href="http://www.google.com" target="_top">take me to the google.com</a>
     <!-- parent tag -->
     <a href="http://www.google.com" target="_parent">take me to the google.com</a>
     <!-- link to new tab -->
     <a href="http://www.google.com" target="_blank">take me to the google.com</a>
</body>
</html>
